name: CI-CD-Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # 1. Checkout
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4   # descarga el repo en el runner

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Install deps
        run: pip install pytest pylint

      # 4. Análisis estático
      - name: Lint (pylint)
        run: pylint **/*.py || true

      # 5. Pruebas unitarias
        # si falla → pipeline se detiene
      - name: Run tests
        run: pytest -q

      # 6. Build (usar carpeta build como artefacto)
      - name: Build
        run: echo "Build listo"

      # 7. Upload artifact (opcional)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitio
          path: build/

  # 8. Deploy a GitHub Pages
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build